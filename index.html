<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EvoCoach Elite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; background: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    .safe-top { padding-top: max(1rem, env(safe-area-inset-top)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const STORAGE_KEY = "evocoach.elite.v6";
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const toNumber = (value, fallback = 0) => {
      const n = Number(String(value ?? "").replace(",", "."));
      return Number.isFinite(n) ? n : fallback;
    };
    const toISODate = (value) => {
      if (!value) return todayISO();
      const raw = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const match = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{2,4})$/);
      if (match) {
        const [, d, m, y] = match;
        const year = y.length === 2 ? `20${y}` : y;
        return `${year}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
      }
      const parsed = new Date(raw);
      return Number.isNaN(parsed.getTime()) ? todayISO() : parsed.toISOString().slice(0, 10);
    };
    const fmtDate = (value) => {
      const iso = toISODate(value);
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    };
    const monthKey = (iso) => toISODate(iso).slice(0, 7);
    const normalizeName = (name) => String(name || "Exercicio").trim().replace(/\s+/g, " ");
    const upper = (name) => normalizeName(name).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();

    const muscleRules = [
      [/SUPINO|PUSH|FLEX|PARALELA|CRUCIFIXO|PECK/, "Peito"],
      [/AGACH|LEG PRESS|EXTENSORA|STIFF|FLEXORA|PANTURRILHA|AFUNDO|SUMO|ELEVA.*PELVICA|GLUTE/, "Pernas"],
      [/PUXADA|REMADA|BARRA|GRAVITON|PULL|DEAD HANG/, "Costas"],
      [/DESENV|ARNOLD|LATERAL|FRONTAL|FACE PULL|OMBRO/, "Ombros"],
      [/TRICEPS|BICEPS|ROSCA/, "Bracos"],
      [/ABD|PRANCHA|PLANK|CORE/, "Core"],
      [/BIKE|CAMINHADA|ESTEIRA|ERGOMETRICA|CARDIO/, "Cardio"],
    ];
    const muscleOf = (name) => (muscleRules.find(([rx]) => rx.test(upper(name))) || [null, "Outros"])[1];

    const defaultData = {
      metrics: { weight: 94.6, bf: 23, arms: 41, chest: 110, waist: 92, legs: 66 },
      feed: [],
      prs: [],
      evolution: [
        { date: "2026-03-13", weight: 96, bf: 24.5, arms: 39.5 },
        { date: "2026-05-04", weight: 94.6, bf: 23, arms: 41 },
      ],
      measurementsHistory: [],
    };

    function normalizeBackup(input) {
      const source = input && typeof input === "object" ? input : {};
      const metrics = { ...defaultData.metrics, ...(source.metrics || {}) };
      Object.keys(metrics).forEach((key) => metrics[key] = toNumber(metrics[key], defaultData.metrics[key] || 0));

      const feed = Array.isArray(source.feed) ? source.feed : Array.isArray(source.workouts) ? source.workouts : [];
      const cleanFeed = feed.map((workout, wi) => {
        const date = toISODate(workout.date || workout.createdAt || workout.id);
        const exercises = Array.isArray(workout.exercises) ? workout.exercises : [];
        return {
          id: String(workout.id || `${date}-${wi}`),
          date,
          title: String(workout.title || workout.type || "Treino Importado"),
          exercises: exercises.map((exercise) => {
            const sets = Array.isArray(exercise.sets) ? exercise.sets : Array.isArray(exercise.loggedSets) ? exercise.loggedSets : [];
            return {
              name: normalizeName(exercise.name),
              sets: sets.map((set) => ({
                load: toNumber(set.load ?? set.weight ?? set.carga, 0),
                reps: toNumber(set.reps ?? set.repetitions, 0),
                completed: set.completed !== false,
              })).filter((set) => set.reps > 0 || set.load !== 0),
            };
          }).filter((exercise) => exercise.name && exercise.sets.length),
        };
      }).filter((workout) => workout.exercises.length)
        .sort((a, b) => b.date.localeCompare(a.date));

      const evolutionSource = Array.isArray(source.evolution) ? source.evolution : [];
      const evolution = evolutionSource.map((row) => ({
        date: toISODate(row.date),
        weight: toNumber(row.weight, metrics.weight),
        bf: toNumber(row.bf, metrics.bf),
        arms: toNumber(row.arms, metrics.arms),
      })).sort((a, b) => a.date.localeCompare(b.date));

      const history = Array.isArray(source.measurementsHistory) ? source.measurementsHistory.map((row) => ({
        ...row,
        date: toISODate(row.date),
      })) : [];

      return { metrics, feed: cleanFeed, prs: computePRs(cleanFeed, source.prs), evolution, measurementsHistory: history };
    }

    function computePRs(feed, importedPrs = []) {
      const best = new Map();
      if (Array.isArray(importedPrs)) {
        importedPrs.forEach((pr) => {
          const name = normalizeName(pr.exercise || pr.name);
          if (!name) return;
          best.set(upper(name), { exercise: name, load: toNumber(pr.load, 0), reps: toNumber(pr.reps, 0), date: toISODate(pr.date) });
        });
      }
      feed.forEach((workout) => workout.exercises.forEach((exercise) => {
        exercise.sets.forEach((set) => {
          const load = Math.abs(toNumber(set.load, 0));
          if (!load) return;
          const key = upper(exercise.name);
          const current = best.get(key);
          if (!current || load > current.load || (load === current.load && toNumber(set.reps, 0) > toNumber(current.reps, 0))) {
            best.set(key, { exercise: exercise.name, load, reps: toNumber(set.reps, 0), date: workout.date });
          }
        });
      }));
      return [...best.values()].sort((a, b) => b.load - a.load || a.exercise.localeCompare(b.exercise));
    }

    function deriveEvolution(feed, metrics, imported = []) {
      const map = new Map(imported.map((row) => [monthKey(row.date), row]));
      feed.forEach((workout) => {
        const key = monthKey(workout.date);
        if (!map.has(key)) map.set(key, { date: `${key}-01`, weight: null, bf: null, arms: null, workouts: 0 });
        map.get(key).workouts = (map.get(key).workouts || 0) + 1;
      });
      const rows = [...map.values()].sort((a, b) => a.date.localeCompare(b.date));
      return rows.map((row) => ({ ...row, weight: row.weight ?? metrics.weight, bf: row.bf ?? metrics.bf, arms: row.arms ?? metrics.arms }));
    }

    function exportJson(data) {
      const blob = new Blob([JSON.stringify({ ...data, exportedAt: new Date().toISOString(), version: 6 }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `evocoach_backup_${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function App() {
      const [tab, setTab] = useState("dashboard");
      const [toast, setToast] = useState("");
      const [data, setData] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? normalizeBackup(JSON.parse(saved)) : normalizeBackup(defaultData);
        } catch {
          return normalizeBackup(defaultData);
        }
      });

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }, [data]);

      const stats = useMemo(() => buildStats(data), [data]);
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3200); };
      const patchData = (patch) => setData((prev) => normalizeBackup({ ...prev, ...patch }));

      const handleImport = async (file) => {
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const clean = normalizeBackup(parsed);
          setData(clean);
          setTab("dashboard");
          showToast(`Backup importado: ${clean.feed.length} treinos, ${clean.prs.length} PRs.`);
        } catch (error) {
          showToast("Nao consegui importar: JSON invalido ou corrompido.");
        }
      };

      const saveWorkout = (workout) => {
        const clean = normalizeBackup({ ...data, feed: [workout, ...data.feed] });
        setData(clean);
        setTab("feed");
        showToast("Treino salvo e dashboards recalculados.");
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100">
          <div className="mx-auto flex min-h-screen w-full max-w-md flex-col border-x border-slate-900 bg-slate-950 shadow-2xl">
            <header className="safe-top sticky top-0 z-20 border-b border-slate-800 bg-slate-950/95 px-5 pb-4 backdrop-blur">
              <div className="flex items-center justify-between">
                <button onClick={() => setTab("dashboard")} className="text-left">
                  <p className="text-[11px] font-black uppercase tracking-[0.22em] text-orange-400">Elite v6</p>
                  <h1 className="text-2xl font-black tracking-tight">EvoCoach</h1>
                </button>
                <div className="flex items-center gap-2">
                  <IconButton title="Exportar" onClick={() => exportJson(data)}>↓</IconButton>
                  <label title="Importar" className="flex h-10 w-10 cursor-pointer items-center justify-center rounded-xl border border-slate-700 bg-slate-900 text-lg font-black text-green-400 active:scale-95">
                    ↑<input className="hidden" type="file" accept=".json,application/json" onChange={(e) => handleImport(e.target.files[0])} />
                  </label>
                </div>
              </div>
            </header>

            <main className="no-scrollbar flex-1 overflow-y-auto px-4 pb-28 pt-4">
              {tab === "dashboard" && <Dashboard data={data} stats={stats} />}
              {tab === "feed" && <Feed feed={data.feed} />}
              {tab === "prs" && <PRs prs={data.prs} stats={stats} />}
              {tab === "treinar" && <Workout onSave={saveWorkout} prs={data.prs} />}
              {tab === "perfil" && <Profile data={data} patchData={patchData} stats={stats} onExport={() => exportJson(data)} onImport={handleImport} />}
            </main>

            <nav className="safe-bottom fixed bottom-0 left-1/2 z-30 grid h-20 w-full max-w-md -translate-x-1/2 grid-cols-5 border-t border-slate-800 bg-slate-950/95 px-2 pt-2 backdrop-blur">
              <Nav label="Dash" active={tab === "dashboard"} onClick={() => setTab("dashboard")} icon="▣" />
              <Nav label="Diario" active={tab === "feed"} onClick={() => setTab("feed")} icon="≡" />
              <button onClick={() => setTab("treinar")} className="-mt-7 flex flex-col items-center gap-1 text-orange-400 active:scale-95">
                <span className="flex h-16 w-16 items-center justify-center rounded-full border-4 border-slate-950 bg-orange-500 text-3xl font-black text-slate-950 shadow-lg shadow-orange-500/30">+</span>
                <span className="text-[10px] font-black">Treinar</span>
              </button>
              <Nav label="PRs" active={tab === "prs"} onClick={() => setTab("prs")} icon="★" />
              <Nav label="Perfil" active={tab === "perfil"} onClick={() => setTab("perfil")} icon="●" />
            </nav>
          </div>
          {toast && <div className="fixed left-1/2 top-4 z-50 w-[calc(100%-2rem)] max-w-sm -translate-x-1/2 rounded-2xl border border-orange-500/30 bg-slate-900 px-4 py-3 text-sm font-bold text-orange-200 shadow-xl">{toast}</div>}
        </div>
      );
    }

    function buildStats(data) {
      const feed = data.feed || [];
      const totalSets = feed.reduce((sum, w) => sum + w.exercises.reduce((s, e) => s + e.sets.length, 0), 0);
      const totalVolume = feed.reduce((sum, w) => sum + workoutVolume(w), 0);
      const uniqueDays = new Set(feed.map((w) => w.date)).size;
      const last30 = feed.filter((w) => daysAgo(w.date) <= 30);
      const byMuscle = {};
      const byMonth = {};
      const frequency = {};
      feed.forEach((w) => {
        byMonth[monthKey(w.date)] = (byMonth[monthKey(w.date)] || 0) + 1;
        w.exercises.forEach((e) => {
          const muscle = muscleOf(e.name);
          const volume = e.sets.reduce((sum, s) => sum + Math.abs(toNumber(s.load)) * toNumber(s.reps), 0);
          byMuscle[muscle] = (byMuscle[muscle] || 0) + volume;
          frequency[upper(e.name)] = frequency[upper(e.name)] || { name: e.name, count: 0, volume: 0 };
          frequency[upper(e.name)].count += 1;
          frequency[upper(e.name)].volume += volume;
        });
      });
      const topExercises = Object.values(frequency).sort((a, b) => b.volume - a.volume).slice(0, 6);
      const muscleRows = Object.entries(byMuscle).map(([name, value]) => ({ name, value: Math.round(value) })).sort((a, b) => b.value - a.value);
      const monthly = Object.entries(byMonth).sort().slice(-8).map(([name, value]) => ({ name: name.slice(5), value }));
      const lastWorkout = feed[0];
      const currentStreak = calcStreak(feed);
      return { totalSets, totalVolume, uniqueDays, last30, muscleRows, monthly, topExercises, lastWorkout, currentStreak, evolution: deriveEvolution(feed, data.metrics, data.evolution) };
    }

    const daysAgo = (iso) => Math.floor((new Date(todayISO()) - new Date(toISODate(iso))) / 86400000);
    const workoutVolume = (workout) => workout.exercises.reduce((sum, e) => sum + e.sets.reduce((s, set) => s + Math.abs(toNumber(set.load)) * toNumber(set.reps), 0), 0);
    function calcStreak(feed) {
      const dates = [...new Set(feed.map((w) => w.date))].sort((a, b) => b.localeCompare(a));
      if (!dates.length) return 0;
      let cursor = new Date(dates[0]);
      let streak = 0;
      for (const date of dates) {
        const current = new Date(date);
        const diff = Math.round((cursor - current) / 86400000);
        if (streak === 0 || diff <= 1) {
          streak += 1;
          cursor = current;
        } else if (diff > 1) break;
      }
      return streak;
    }

    function Dashboard({ data, stats }) {
      const latest = stats.evolution[stats.evolution.length - 1] || {};
      const first = stats.evolution[0] || latest;
      const bfDelta = toNumber(latest.bf) - toNumber(first.bf);
      const armDelta = toNumber(latest.arms) - toNumber(first.arms);
      return (
        <section className="space-y-4">
          <div className="rounded-3xl border border-orange-500/20 bg-gradient-to-br from-orange-500/15 to-slate-900 p-5">
            <p className="text-xs font-black uppercase tracking-[0.18em] text-orange-300">Resumo</p>
            <h2 className="mt-2 text-3xl font-black leading-tight">Carga, frequencia e recomposicao no mesmo painel.</h2>
            <div className="mt-5 grid grid-cols-3 gap-2">
              <Metric label="Treinos" value={stats.uniqueDays} />
              <Metric label="Series" value={stats.totalSets} />
              <Metric label="Streak" value={`${stats.currentStreak}d`} />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <Panel title="Peso" value={`${data.metrics.weight} kg`} detail={`BF ${data.metrics.bf}%`} tone="green" />
            <Panel title="Volume total" value={compact(stats.totalVolume)} detail={`${stats.last30.length} treinos em 30d`} tone="blue" />
          </div>

          <Card title="Volume por grupo">
            <Bars rows={stats.muscleRows} />
          </Card>

          <Card title="Frequencia mensal">
            <SparkBars rows={stats.monthly} />
          </Card>

          <Card title="Recomposicao">
            <div className="grid grid-cols-2 gap-3">
              <Delta label="BF desde inicio" value={bfDelta} suffix="%" inverse />
              <Delta label="Braco desde inicio" value={armDelta} suffix=" cm" />
            </div>
          </Card>

          <Card title="Ultimo treino">
            {stats.lastWorkout ? (
              <div>
                <div className="flex items-start justify-between gap-3">
                  <div>
                    <p className="font-black text-white">{stats.lastWorkout.title}</p>
                    <p className="text-xs font-bold text-slate-500">{fmtDate(stats.lastWorkout.date)}</p>
                  </div>
                  <span className="rounded-xl bg-slate-800 px-3 py-1 text-xs font-black text-orange-300">{compact(workoutVolume(stats.lastWorkout))}</span>
                </div>
                <div className="mt-4 flex flex-wrap gap-2">
                  {stats.lastWorkout.exercises.slice(0, 6).map((e) => <span key={e.name} className="rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-[11px] font-bold text-slate-300">{e.name}</span>)}
                </div>
              </div>
            ) : <Empty text="Importe um backup ou salve um treino." />}
          </Card>
        </section>
      );
    }

    function Workout({ onSave, prs }) {
      const templates = {
        "Superior": ["Supino Reto", "Remada", "Arnold Press", "Puxada Alta", "Triceps Corda"],
        "Inferior": ["Agachamento Livre", "Leg Press", "Stiff", "Cadeira Extensora", "Panturrilha"],
        "Full Body": ["Agachamento Livre", "Supino Reto", "Remada", "Desenvolvimento", "Prancha"],
      };
      const [type, setType] = useState("Superior");
      const [title, setTitle] = useState("Treino Livre");
      const [items, setItems] = useState(() => templates.Superior.map(makeExercise));

      const choose = (name) => { setType(name); setTitle(name); setItems(templates[name].map(makeExercise)); };
      const updateSet = (ei, si, key, value) => setItems((prev) => prev.map((ex, i) => i !== ei ? ex : { ...ex, sets: ex.sets.map((s, j) => j !== si ? s : { ...s, [key]: value }) }));
      const addSet = (ei) => setItems((prev) => prev.map((ex, i) => i !== ei ? ex : { ...ex, sets: [...ex.sets, { load: 0, reps: 10 }] }));
      const removeExercise = (ei) => setItems((prev) => prev.filter((_, i) => i !== ei));
      const addExercise = () => setItems((prev) => [...prev, makeExercise("Novo Exercicio")]);
      const save = () => onSave({ id: `${Date.now()}`, date: todayISO(), title, exercises: items.filter((e) => e.name.trim()).map((e) => ({ ...e, sets: e.sets.filter((s) => toNumber(s.reps) || toNumber(s.load)) })) });

      return (
        <section className="space-y-4">
          <div className="flex gap-2 overflow-x-auto no-scrollbar">
            {Object.keys(templates).map((name) => <button key={name} onClick={() => choose(name)} className={`shrink-0 rounded-2xl px-4 py-3 text-sm font-black ${type === name ? "bg-orange-500 text-slate-950" : "bg-slate-900 text-slate-400 border border-slate-800"}`}>{name}</button>)}
          </div>
          <input value={title} onChange={(e) => setTitle(e.target.value)} className="w-full rounded-2xl border border-slate-800 bg-slate-900 px-4 py-4 text-xl font-black outline-none focus:border-orange-500" />
          {items.map((ex, ei) => {
            const pr = prs.find((p) => upper(p.exercise) === upper(ex.name));
            return (
              <Card key={ei} title="">
                <div className="mb-3 flex items-center gap-2">
                  <input value={ex.name} onChange={(e) => setItems((prev) => prev.map((item, i) => i === ei ? { ...item, name: e.target.value } : item))} className="min-w-0 flex-1 bg-transparent text-base font-black uppercase text-blue-300 outline-none" />
                  <button onClick={() => removeExercise(ei)} className="h-9 w-9 rounded-xl bg-slate-800 font-black text-slate-400">×</button>
                </div>
                {pr && <p className="mb-3 rounded-xl bg-yellow-500/10 px-3 py-2 text-xs font-bold text-yellow-300">PR: {pr.load}kg x {pr.reps || "?"} em {fmtDate(pr.date)}</p>}
                <div className="space-y-2">
                  {ex.sets.map((set, si) => (
                    <div key={si} className="grid grid-cols-[1fr_1fr_2.5rem] gap-2">
                      <NumberInput value={set.load} onChange={(v) => updateSet(ei, si, "load", v)} suffix="kg" />
                      <NumberInput value={set.reps} onChange={(v) => updateSet(ei, si, "reps", v)} suffix="rep" />
                      <button onClick={() => updateSet(ei, si, "done", !set.done)} className={`rounded-xl text-lg font-black ${set.done ? "bg-green-500 text-slate-950" : "bg-slate-800 text-slate-500"}`}>✓</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => addSet(ei)} className="mt-3 w-full rounded-xl border border-slate-700 py-3 text-sm font-black text-slate-300">Adicionar serie</button>
              </Card>
            );
          })}
          <button onClick={addExercise} className="w-full rounded-2xl border border-dashed border-slate-700 py-4 font-black text-slate-300">Adicionar exercicio</button>
          <button onClick={save} className="w-full rounded-3xl bg-green-500 py-5 text-lg font-black text-slate-950 shadow-lg shadow-green-500/20">Concluir treino</button>
        </section>
      );
    }

    const makeExercise = (name) => ({ name, sets: [{ load: 0, reps: 10, done: false }, { load: 0, reps: 10, done: false }, { load: 0, reps: 10, done: false }] });

    function Profile({ data, patchData, stats, onExport, onImport }) {
      const [metrics, setMetrics] = useState(data.metrics);
      useEffect(() => setMetrics(data.metrics), [data.metrics]);
      const saveMetrics = () => {
        const row = { date: todayISO(), ...metrics };
        patchData({ metrics, evolution: [...data.evolution.filter((e) => e.date !== row.date), row].sort((a, b) => a.date.localeCompare(b.date)), measurementsHistory: [row, ...data.measurementsHistory] });
      };
      return (
        <section className="space-y-4">
          <Card title="Medidas">
            <div className="grid grid-cols-2 gap-3">
              {Object.entries({ weight: "Peso", bf: "BF %", arms: "Braco", chest: "Peito", waist: "Cintura", legs: "Pernas" }).map(([key, label]) => (
                <label key={key} className="rounded-2xl border border-slate-800 bg-slate-950 p-3">
                  <span className="block text-[10px] font-black uppercase text-slate-500">{label}</span>
                  <input type="number" value={metrics[key] ?? 0} onChange={(e) => setMetrics({ ...metrics, [key]: toNumber(e.target.value) })} className="mt-1 w-full bg-transparent text-xl font-black outline-none focus:text-orange-300" />
                </label>
              ))}
            </div>
            <button onClick={saveMetrics} className="mt-4 w-full rounded-2xl bg-orange-500 py-4 font-black text-slate-950">Salvar medidas</button>
          </Card>
          <Card title="Importar e exportar">
            <div className="grid grid-cols-2 gap-3">
              <button onClick={onExport} className="rounded-2xl bg-slate-800 py-4 font-black text-blue-300">Exportar JSON</button>
              <label className="cursor-pointer rounded-2xl bg-slate-800 py-4 text-center font-black text-green-300">
                Importar JSON<input className="hidden" type="file" accept=".json,application/json" onChange={(e) => onImport(e.target.files[0])} />
              </label>
            </div>
            <p className="mt-4 text-xs font-bold leading-relaxed text-slate-500">O importador aceita backups antigos, datas em ISO ou dd/mm/aaaa, cargas negativas de maquinas assistidas e recalcula dashboards automaticamente.</p>
          </Card>
          <Card title="Diagnostico dos dados">
            <div className="grid grid-cols-2 gap-2 text-sm">
              <Metric label="Treinos" value={data.feed.length} />
              <Metric label="PRs" value={data.prs.length} />
              <Metric label="Exercicios top" value={stats.topExercises.length} />
              <Metric label="Meses" value={stats.monthly.length} />
            </div>
          </Card>
        </section>
      );
    }

    function Feed({ feed }) {
      if (!feed.length) return <Empty text="Nenhum treino registrado." />;
      return (
        <section className="space-y-4">
          <h2 className="px-1 text-3xl font-black">Diario</h2>
          {feed.map((w) => (
            <Card key={w.id} title="">
              <div className="mb-4 flex items-start justify-between">
                <div><h3 className="font-black">{w.title}</h3><p className="text-xs font-bold text-slate-500">{fmtDate(w.date)}</p></div>
                <span className="rounded-xl bg-slate-800 px-3 py-1 text-xs font-black text-orange-300">{compact(workoutVolume(w))}</span>
              </div>
              <div className="space-y-3">
                {w.exercises.map((ex) => (
                  <div key={ex.name}>
                    <p className="text-sm font-black text-blue-300">{ex.name}</p>
                    <div className="mt-1 flex flex-wrap gap-2">
                      {ex.sets.map((s, i) => <span key={i} className="rounded-lg bg-slate-950 px-2 py-1 text-[11px] font-bold text-slate-300">{s.load}kg x {s.reps}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          ))}
        </section>
      );
    }

    function PRs({ prs, stats }) {
      return (
        <section className="space-y-4">
          <h2 className="px-1 text-3xl font-black">Recordes</h2>
          <Card title="Top volume">
            <Bars rows={stats.topExercises.map((e) => ({ name: e.name, value: Math.round(e.volume) }))} />
          </Card>
          <div className="grid gap-3">
            {prs.map((pr) => (
              <div key={upper(pr.exercise)} className="rounded-3xl border border-slate-800 bg-slate-900 p-4">
                <p className="text-xs font-black uppercase text-slate-500">{pr.exercise}</p>
                <div className="mt-1 flex items-end justify-between">
                  <h3 className="text-3xl font-black text-white">{pr.load}kg</h3>
                  <p className="text-xs font-bold text-slate-500">{fmtDate(pr.date)}</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Card({ title, children }) {
      return <div className="rounded-3xl border border-slate-800 bg-slate-900 p-4 shadow-sm">{title && <h3 className="mb-4 text-sm font-black uppercase tracking-wide text-slate-300">{title}</h3>}{children}</div>;
    }
    function Metric({ label, value }) {
      return <div className="rounded-2xl bg-slate-950/70 p-3"><p className="text-[10px] font-black uppercase text-slate-500">{label}</p><p className="mt-1 text-xl font-black text-white">{value}</p></div>;
    }
    function Panel({ title, value, detail, tone }) {
      const color = tone === "green" ? "text-green-300" : "text-blue-300";
      return <div className="rounded-3xl border border-slate-800 bg-slate-900 p-4"><p className="text-xs font-black uppercase text-slate-500">{title}</p><p className={`mt-2 text-2xl font-black ${color}`}>{value}</p><p className="mt-1 text-xs font-bold text-slate-500">{detail}</p></div>;
    }
    function Delta({ label, value, suffix, inverse }) {
      const good = inverse ? value <= 0 : value >= 0;
      return <div className="rounded-2xl bg-slate-950 p-4"><p className="text-xs font-black uppercase text-slate-500">{label}</p><p className={`mt-2 text-2xl font-black ${good ? "text-green-300" : "text-red-300"}`}>{value > 0 ? "+" : ""}{value.toFixed(1)}{suffix}</p></div>;
    }
    function Bars({ rows }) {
      const max = Math.max(1, ...rows.map((r) => r.value));
      if (!rows.length) return <Empty text="Sem dados suficientes." />;
      return <div className="space-y-3">{rows.map((r) => <div key={r.name}><div className="mb-1 flex justify-between text-xs font-bold"><span className="text-slate-300">{r.name}</span><span className="text-slate-500">{compact(r.value)}</span></div><div className="h-3 overflow-hidden rounded-full bg-slate-950"><div className="h-full rounded-full bg-orange-500" style={{ width: `${clamp((r.value / max) * 100, 4, 100)}%` }} /></div></div>)}</div>;
    }
    function SparkBars({ rows }) {
      const max = Math.max(1, ...rows.map((r) => r.value));
      if (!rows.length) return <Empty text="Sem frequencia registrada." />;
      return <div className="flex h-32 items-end gap-2">{rows.map((r) => <div key={r.name} className="flex flex-1 flex-col items-center gap-2"><div className="w-full rounded-t-xl bg-blue-500" style={{ height: `${clamp((r.value / max) * 100, 8, 100)}%` }} /><span className="text-[10px] font-black text-slate-500">{r.name}</span></div>)}</div>;
    }
    function NumberInput({ value, onChange, suffix }) {
      return <label className="flex items-center rounded-xl border border-slate-800 bg-slate-950 px-3"><input type="number" value={value} onChange={(e) => onChange(e.target.value)} className="min-w-0 flex-1 bg-transparent py-3 text-center text-lg font-black outline-none" /><span className="text-[10px] font-black text-slate-600">{suffix}</span></label>;
    }
    function IconButton({ children, onClick, title }) {
      return <button title={title} onClick={onClick} className="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-700 bg-slate-900 text-lg font-black text-orange-400 active:scale-95">{children}</button>;
    }
    function Nav({ label, active, onClick, icon }) {
      return <button onClick={onClick} className={`flex flex-col items-center justify-center gap-1 rounded-2xl text-[10px] font-black ${active ? "text-orange-400" : "text-slate-500"}`}><span className="text-xl">{icon}</span>{label}</button>;
    }
    function Empty({ text }) {
      return <div className="rounded-3xl border border-dashed border-slate-800 bg-slate-900/40 p-8 text-center text-sm font-bold text-slate-500">{text}</div>;
    }
    function compact(n) {
      const value = toNumber(n, 0);
      if (Math.abs(value) >= 1000000) return `${(value / 1000000).toFixed(1)}M`;
      if (Math.abs(value) >= 1000) return `${(value / 1000).toFixed(1)}k`;
      return Math.round(value);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
