<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino Nuvem</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1>☁️ Treino Nuvem</h1>
    </header>

    <main class="app-content">
        <!-- Dashboard View -->
        <section id="view-dashboard" class="view active">
            <h2>Resumo de Evolução</h2>
            <div class="card">
                <canvas id="evolutionChart"></canvas>
            </div>
            <h3>Últimos Treinos</h3>
            <div id="recent-workouts-list"></div>
        </section>

        <!-- Treinar View -->
        <section id="view-train" class="view">
            <h2>Iniciar Treino</h2>
            <div id="routine-selector" class="card">
                <p>Selecione uma rotina:</p>
                <select id="routine-select">
                    <option value="">Carregando rotinas...</option>
                </select>
                <button id="btn-start-workout" class="btn primary">Começar</button>
            </div>
            
            <div id="active-workout" class="hidden">
                <h3 id="active-workout-name"></h3>
                <div id="workout-exercises"></div>
                <button id="btn-finish-workout" class="btn success" style="width: 100%; margin-top: 20px;">Finalizar e Salvar Treino</button>
                <button id="btn-cancel-workout" class="btn danger" style="width: 100%; margin-top: 10px;">Cancelar</button>
            </div>
        </section>

        <!-- Histórico View -->
        <section id="view-history" class="view">
            <h2>Histórico Completo</h2>
            <div id="history-list"></div>
        </section>

        <!-- Config View -->
        <section id="view-config" class="view">
            <h2>Configurações e Dados</h2>
            <div class="card">
                <h3>Gerenciar Dados</h3>
                <p>Importe seu backup JSON para restaurar rotinas e histórico.</p>
                <input type="file" id="file-import" accept=".json" style="display: none;">
                <button class="btn secondary" onclick="document.getElementById('file-import').click()">Importar Backup (JSON)</button>
                <br><br>
                <button id="btn-export" class="btn primary">Exportar Backup (JSON)</button>
                <br><br>
                <button id="btn-clear-data" class="btn danger">Apagar Tudo</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-target="view-dashboard">
            <i class="fas fa-chart-line"></i>
            <span>Início</span>
        </button>
        <button class="nav-item" data-target="view-train">
            <i class="fas fa-dumbbell"></i>
            <span>Treinar</span>
        </button>
        <button class="nav-item" data-target="view-history">
            <i class="fas fa-history"></i>
            <span>Histórico</span>
        </button>
        <button class="nav-item" data-target="view-config">
            <i class="fas fa-cog"></i>
            <span>Config</span>
        </button>
    </nav>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker Registrado');
            });
        }
    </script>
</body>
</html>
