<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino Master - Reset Zero</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 2. BASE DE DADOS INTEGRADA (Para não depender de carregamento externo) ---
        const DATABASE = {
            "Superior A": ["Floor YTW", "Supino Halteres", "Standard Push-up", "Desenvolvimento Ombros", "Tríceps Corda"],
            "Inferior A": ["Agachamento Livre", "Leg Press", "Cadeira Extensora", "Panturrilha Sentado"],
            "Superior B": ["Puxada Alta", "Remada Curvada", "Bíceps Rosca Direta", "Face Pull"],
            "Inferior B": ["Stiff", "Cadeira Flexora", "Agachamento Sumô", "Plank"]
        };

        const MULTIPLIERS = {
            "Agachamento Livre": 1.0, "Plank": 1.0, "Standard Push-up": 0.6, "Flexão": 0.6
        };

        function App() {
            // Estados básicos
            const [view, setView] = useState('dashboard');
            const [weight, setWeight] = useState(94.6);
            const [workouts, setWorkouts] = useState([]);
            const [currentWorkout, setCurrentWorkout] = useState(null);
            const [loading, setLoading] = useState(false);

            // --- 3. TESTE DE CONEXÃO (FIREBASE) ---
            useEffect(() => {
                try {
                    const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;
                    if (config && typeof firebase !== 'undefined') {
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        firebase.auth().signInAnonymously().then(() => {
                            console.log("Autenticado com sucesso.");
                        });
                    }
                } catch (e) {
                    console.error("Erro na inicialização:", e);
                }
            }, []);

            // --- 4. FUNÇÕES DE AÇÃO (SIMPLIFICADAS PARA TESTE) ---
            const startNewWorkout = (type) => {
                setCurrentWorkout({
                    id: Date.now(),
                    type: type,
                    date: new Date().toLocaleDateString(),
                    exercises: DATABASE[type].map(ex => ({
                        name: ex,
                        sets: [{ reps: 10, weight: 0, rpe: 7 }]
                    }))
                });
                setView('editor');
            };

            const saveWorkout = () => {
                setLoading(true);
                // Simulação de salvamento para testar interface
                setTimeout(() => {
                    setWorkouts([currentWorkout, ...workouts]);
                    setCurrentWorkout(null);
                    setView('dashboard');
                    setLoading(false);
                }, 800);
            };

            // --- 5. INTERFACE (CONSTRUÇÃO MODULAR) ---
            return (
                <div className="max-w-md mx-auto p-4 pb-24">
                    
                    {/* Header Simples */}
                    <header className="flex justify-between items-center mb-8">
                        <h1 className="text-xl font-black italic">MASTER <span className="text-blue-600">ZERO</span></h1>
                        <div className="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-1 rounded-full uppercase">App Ativo</div>
                    </header>

                    {view === 'dashboard' && (
                        <div className="space-y-4 animate-in">
                            <div className="bg-blue-600 p-6 rounded-[2rem] text-white shadow-xl">
                                <h2 className="text-lg font-bold mb-4">Iniciar Treino de Hoje</h2>
                                <div className="grid grid-cols-2 gap-2">
                                    {Object.keys(DATABASE).map(tipo => (
                                        <button 
                                            key={tipo}
                                            onClick={() => startNewWorkout(tipo)}
                                            className="bg-white/20 hover:bg-white/30 p-3 rounded-xl text-xs font-black uppercase transition-all active:scale-95"
                                        >
                                            {tipo}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-2">
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest px-1">Histórico Local</h3>
                                {workouts.length === 0 ? (
                                    <p className="text-xs text-slate-400 italic p-4">Nenhum treino na memória temporária.</p>
                                ) : (
                                    workouts.map(w => (
                                        <div key={w.id} className="bg-white p-4 rounded-2xl border border-slate-200 flex justify-between items-center">
                                            <span className="font-bold">{w.type}</span>
                                            <span className="text-[10px] opacity-50">{w.date}</span>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'editor' && currentWorkout && (
                        <div className="space-y-6">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('dashboard')} className="text-slate-400 font-bold">Voltar</button>
                                <h2 className="text-xl font-black">{currentWorkout.type}</h2>
                            </div>

                            {currentWorkout.exercises.map((ex, exIdx) => (
                                <div key={exIdx} className="bg-white p-4 rounded-[1.5rem] border border-slate-200 space-y-3">
                                    <h4 className="font-bold text-sm">{ex.name}</h4>
                                    {ex.sets.map((set, setIdx) => (
                                        <div key={setIdx} className="grid grid-cols-3 gap-2">
                                            <div className="bg-slate-50 p-2 rounded-lg">
                                                <label className="text-[8px] block uppercase font-bold text-slate-400">Reps</label>
                                                <input type="number" defaultValue={set.reps} className="bg-transparent font-bold w-full outline-none" />
                                            </div>
                                            <div className="bg-blue-50 p-2 rounded-lg text-blue-600">
                                                <label className="text-[8px] block uppercase font-bold opacity-50">Peso</label>
                                                <input type="number" defaultValue={set.weight} className="bg-transparent font-bold w-full outline-none" />
                                            </div>
                                            <div className="bg-orange-50 p-2 rounded-lg text-orange-600">
                                                <label className="text-[8px] block uppercase font-bold opacity-50">RPE</label>
                                                <input type="number" defaultValue={set.rpe} className="bg-transparent font-bold w-full outline-none" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}

                            <button 
                                onClick={saveWorkout}
                                className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg shadow-blue-500/30"
                            >
                                {loading ? "A Guardar..." : "Finalizar Treino"}
                            </button>
                        </div>
                    )}

                    {/* Navbar Minimalista */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white border border-slate-200 rounded-[2rem] p-2 flex justify-around shadow-2xl">
                        <button onClick={() => setView('dashboard')} className={`p-4 rounded-full ${view === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                           Dashboard
                        </button>
                        <button onClick={() => setView('weight')} className={`p-4 rounded-full ${view === 'weight' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                           Peso
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
